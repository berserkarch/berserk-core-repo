    - id: Cinnamon-Desktop
      name: "Cinnamon"

      description: "<html><h3>Cinnamon</h3>is a free and open-source desktop environment for the X Window System that derives from GNOME 3 but follows traditional desktop metaphor conventions.<br/><br/><br/><br/><br/></html>"

      description[de]: "<html><h3>Cinnamon</h3>ist eine freie und quelloffene Desktop-Umgebung für das X Window System, die sich von GNOME 3 ableitet, aber den traditionellen Konventionen der Desktop-Metapher folgt.<br/><br/><br/><br/><br/><br/></html>"

      description[fi]: "<html><h3>Cinnamon</h3>on ilmainen ja avoimen lähdekoodin työpöytäympäristö X Window Systemille, joka perustuu GNOME 3:een mutta noudattaa perinteisiä työpöytämetaforan konventioita.<br/><br/><br/><br/><br/><br/></html>"

      description[fr]: "<html><h3>Cinnamon</h3>est un environnement de bureau libre et gratuit pour le système X Window qui dérive de GNOME 3 mais suit les conventions traditionnelles de la métaphore du bureau.<br/><br/><br/><br/><br/></html>"

      description[it]: "<html><h3>Cinnamon</h3>è un ambiente desktop libero e open-source per il sistema X Window che deriva da GNOME 3 ma segue le convenzioni tradizionali della metafora del desktop.<br/><br/><br/><br/><br/></html>"

      description[es]: "<html><h3>Cinnamon</h3>es un entorno de escritorio libre y de código abierto para el sistema X Window que deriva de GNOME 3 pero sigue las convenciones tradicionales de la metáfora del escritorio.<br/><br/><br/><br/><br/></html>"

      description[ru]: "<html><h3>Cinnamon</h3>среда рабочего стола с открытым исходным кодом для X Window System, которая основана на GNOME 3, но следует традициям классического рабочего стола.<br/><br/><br/><br/><br/><br/></html>"

      description[zh_CN]: "<html><h3>Cinnamon</h3>是X窗口系统的一个自由和开源的桌面环境， 源于GNOME 3，但遵循传统的桌面隐喻惯例。<br/><br/><br/><br/><br/><br/></html>"

      description[ja]: "<html><h3>Cinnamon</h3>は、GNOME 3から派生したX Window System用のフリーでオープンソースのデスクトップ環境ですが、 伝統的なデスクトップメタファーの慣習に則っています。<br/><br/><br/><br/><br/></html>"

      description[sv]: "<html><h3>Cinnamon</h3>är en fri och öppen-källkods skrivbordsmiljö för X Fönster-systemet som härrör från GNOME 3 men följer traditionella skrivbordsmetaforkonventioner.<br/><br/><br/><br/><br/></html>"

      description[pt_BR]: "<html><h3>Cinnamon</h3>é um ambiente de trabalho livre e de código aberto para o X Window System que deriva do GNOME 3, mas segue as convenções tradicionais de desktop.<br/><br/><br/><br/><br/></html>"

      description[tr]: "<html><h3>Cinnamon</h3>X Pencere Sistemi için GNOME 3'ten türetilmiş, ancak geleneksel masaüstü kurallarını izleyen ücretsiz ve açık kaynaklı bir masaüstü ortamıdır.<br/><br/><br/><br/><br/></html>"

      description[ro]: "<html><h3>Cinnamon</h3>este un spațiul de lucru liber și cu sursă deschisă pentru sistemul X Window, care derivă din GNOME 3, dar care urmează convențiile tradiționale ale unei metafore de birou.<br/><br/><br/><br/><br/><br/></html>"

      description[ko]: "<html><h3>Cinnamon</h3>은 X 윈도우 시스템을 위한 자유 소프트웨어 데스크탑 환경으로 GNOME 3에서 파생되었지만 전통적인 데스크탑 환경을 선사합니다.<br/><br/><br/><br/><br/></html>"

      screenshot: "/etc/calamares/de_images/cinnamon.png"

      netinstall:
